<form hx-post="{% url 'apply' %}" hx-target="#wizard-container" class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
    {% csrf_token %}
    <input type="hidden" name="step" value="1">
    
    <div class="flex items-center space-x-3 mb-6">
        <div class="p-2 bg-primary-50 rounded-lg text-primary-600">
            <i data-lucide="user-edit" class="w-6 h-6"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-900">Personal & Academic Information</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700">Full Name</label>
            <input type="text" name="full_name" value="{{ user.get_full_name }}" disabled class="input-field bg-slate-50 cursor-not-allowed">
            <p class="text-[10px] text-slate-400">Locked to your institutional profile</p>
        </div>
        <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700">Matric Number</label>
            <input type="text" name="matric_number" placeholder="e.g. UG/2024/001" required class="input-field">
        </div>
        <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700">Department</label>
            <select name="department" required class="input-field">
                <option value="">Select Department</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Engineering">Engineering</option>
                <option value="Business Admin">Business Admin</option>
                <option value="Fine Arts">Fine Arts</option>
            </select>
        </div>
        <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700">Level</label>
            <select name="level" required class="input-field">
                <option value="">Select Level</option>
                <option value="Year 1">Year 1</option>
                <option value="Year 2">Year 2</option>
                <option value="Year 3">Year 3</option>
                <option value="Year 4">Year 4</option>
            </select>
        </div>
        <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700">Current GPA</label>
            <div class="relative">
                <input type="number" step="0.01" name="gpa" placeholder="0.00" required class="input-field pr-12">
                <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 text-xs font-bold">/ 4.0</span>
            </div>
        </div>
    </div>

    <div class="pt-6 flex justify-end">
        <button type="submit" class="btn btn-primary px-8">
            Continue to Financial Info
            <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
        </button>
    </div>
</form>

<script>
    lucide.createIcons();
    window.dispatchEvent(new CustomEvent('step-change', { detail: 1 }));
</script>
