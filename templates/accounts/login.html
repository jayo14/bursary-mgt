{% extends 'base.html' %}
{% load static %}

{% block title %}Log in | BursaryHub{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-slate-50">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">
            Sign in to your account
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-slate-200">
            <form class="space-y-6" action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-slate-700">
                        Username
                    </label>
                    <div class="mt-1">
                        <input type="text" name="username" id="id_username" required
                               class="w-full border-slate-300 rounded-md shadow-sm focus:ring-[#0032b5] focus:border-[#0032b5]">
                    </div>
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-slate-700">
                        Password
                    </label>
                    <div class="mt-1">
                        <input type="password" name="password" id="id_password" required
                               class="w-full border-slate-300 rounded-md shadow-sm focus:ring-[#0032b5] focus:border-[#0032b5]">
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#0032b5] hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#0032b5]">
                        Sign in
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
