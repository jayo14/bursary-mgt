<aside class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 transform transition-transform duration-300 lg:translate-x-0" 
       :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
       x-data="{ active: '{{ request.resolver_match.url_name }}' }">
    <div class="flex flex-col h-full">
        <!-- Logo -->
        <div class="flex items-center h-16 px-6 border-b border-slate-200">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-lg font-bold text-slate-900 tracking-tight">Bursary MGT</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
            <a href="{% url 'dashboard' %}" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group"
               :class="active === 'dashboard' ? 'bg-primary-50 text-primary-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3 transition-colors"
                   :class="active === 'dashboard' ? 'text-primary-600' : 'text-slate-400 group-hover:text-slate-600'"></i>
                Dashboard
            </a>

            {% if user.role == 'STUDENT' %}
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="file-plus" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Apply for Bursary
            </a>
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="folder-kanban" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                My Applications
            </a>
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="user-circle" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Profile
            </a>
            {% endif %}

            {% if user.role == 'ADMIN' or user.role == 'REVIEWER' %}
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="files" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Applications
            </a>
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="check-square" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Reviews
            </a>
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="banknote" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Disbursements
            </a>
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="bar-chart-3" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Reports
            </a>
            <a href="#" 
               class="flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-600 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="users" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Users
            </a>
            {% endif %}
        </nav>

        <!-- Bottom Actions -->
        <div class="p-4 border-t border-slate-200">
            <a href="#" class="flex items-center px-3 py-2 text-sm font-medium text-slate-600 rounded-lg hover:bg-slate-50 hover:text-slate-900 group">
                <i data-lucide="help-circle" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Help Center
            </a>
            <form action="{% url 'logout' %}" method="post" class="mt-1">
                {% csrf_token %}
                <button type="submit" class="w-full flex items-center px-3 py-2 text-sm font-medium text-rose-600 rounded-lg hover:bg-rose-50 transition-colors group">
                    <i data-lucide="log-out" class="w-5 h-5 mr-3 text-rose-400 group-hover:text-rose-600"></i>
                    Logout
                </button>
            </form>
        </div>
    </div>
</aside>
