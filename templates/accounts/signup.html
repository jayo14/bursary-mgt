{% extends 'base.html' %}
{% load static %}

{% block title %}Create Account | BursaryHub{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center">
            <i data-lucide="graduation-cap" class="w-12 h-12 text-primary-600"></i>
        </div>
        <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">
            Create your student account
        </h2>
        <p class="mt-2 text-center text-sm text-slate-600">
            Or
            <a href="{% url 'login' %}" class="font-medium text-primary-600 hover:text-primary-500">
                sign in to your existing account
            </a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-xl">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-slate-200">
            <form class="space-y-6" action="{% url 'signup' %}" method="POST">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                    <div>
                        <label for="id_first_name" class="block text-sm font-medium text-slate-700">First Name</label>
                        <div class="mt-1">
                            <input type="text" name="first_name" id="id_first_name" required class="input-field">
                        </div>
                    </div>

                    <div>
                        <label for="id_last_name" class="block text-sm font-medium text-slate-700">Last Name</label>
                        <div class="mt-1">
                            <input type="text" name="last_name" id="id_last_name" required class="input-field">
                        </div>
                    </div>

                    <div class="sm:col-span-2">
                        <label for="id_email" class="block text-sm font-medium text-slate-700">Email Address</label>
                        <div class="mt-1">
                            <input type="email" name="email" id="id_email" required class="input-field">
                        </div>
                    </div>

                    <div class="sm:col-span-2">
                        <label for="id_username" class="block text-sm font-medium text-slate-700">Username</label>
                        <div class="mt-1">
                            <input type="text" name="username" id="id_username" required class="input-field">
                        </div>
                    </div>

                    <div class="sm:col-span-2">
                        <label for="id_phone_number" class="block text-sm font-medium text-slate-700">Phone Number</label>
                        <div class="mt-1">
                            <input type="text" name="phone_number" id="id_phone_number" required class="input-field">
                        </div>
                    </div>

                    <div class="sm:col-span-2" x-data="{ show: false }">
                        <label for="id_password1" class="block text-sm font-medium text-slate-700">Password</label>
                        <div class="mt-1 relative">
                            <input :type="show ? 'text' : 'password'" name="password1" id="id_password1" required class="input-field pr-10">
                            <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i data-lucide="eye" x-show="!show" class="h-5 w-5 text-slate-400"></i>
                                <i data-lucide="eye-off" x-show="show" class="h-5 w-5 text-slate-400" style="display: none;"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full btn btn-primary py-3">
                        Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
